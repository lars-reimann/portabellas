version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
    commit-message:
      prefix: 'build'
      include: scope

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    commit-message:
      prefix: 'build'
      include: scope
    groups:
      dev:
        applies-to: version-updates
        dependency-type: development

  - package-ecosystem: uv
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    commit-message:
      prefix: 'build'
      include: scope
    groups:
      mkdocs:
        applies-to: version-updates
        patterns:
          - 'mkdocs*'
      pytest:
        applies-to: version-updates
        patterns:
          - 'pytest*'
      dev:
        applies-to: version-updates
        dependency-type: development
        exclude-patterns:
          - 'mkdocs*'
          - 'pytest*'
        update-types:
          - patch
          - minor
      prod:
        applies-to: version-updates
        dependency-type: production
        exclude-patterns:
          - 'mkdocs*'
          - 'pytest*'
        update-types:
          - patch
          - minor
